<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenses Test</title>
    <link rel="icon" type="image/x-icon" href="dictionary.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <a href="index.html">Words</a>
        <a href="irregular-verbs.html">Verbs</a>
        <a href="test.html">Test</a>
        <a href="name-all-words.html">Guessing game</a>
        <a id="results" href="results.html">Results</a>
    </header>
    <div id="mode-block"><button id="mode" value="Night mode">Night mode</button></div>
    <div id="start-btn-block">
        <button id="start-btn">Start</button>
    </div>

    <div id="question-block">
        <p id="sentence"></p> <br/>
        <input id="answer-input" type="text" spellcheck="false" autocomplete="off" /> <br/>
        <div id="answer-block">
            <button id="answer-btn">Next</button>
            <p id="questions">Questions: <span id="question-num">0</span>/20</p>
        </div>
    </div>

    <div id="congratulation-block">
        <h1>Congratulations!</h1>
        <p>Ти вказав час правильно в <span id="correct-count">0</span> реченнях з 20!</p> <br/> <br/>
        <button>OK</button>
    </div>

    <script src="sentence-test.js"></script>
    <script src="mode-change.js"></script>
</body>

</html>
